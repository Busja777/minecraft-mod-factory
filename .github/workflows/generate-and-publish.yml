name: Generate and Publish Mod

on:
  schedule:
    - cron: '0 10 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Node dependencies
        run: npm ci

      - name: Generate mod via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate.js

      - name: Generate images via fal.ai
        env:
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
        run: node scripts/build-images.js

      - name: Inject generated code into template
        run: node scripts/inject.js

      - name: Build mod with Gradle
        id: first-build
        continue-on-error: true
        working-directory: ./template
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon 2>&1 | tee ../build-output.txt
          exit ${PIPESTATUS[0]}

      - name: Auto-fix compile errors via Claude
        if: steps.first-build.outcome == 'failure'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          echo "::warning::First build failed — sending errors to Claude for fix..."
          node scripts/fix.js
          node scripts/inject.js

      - name: Retry build after fix
        if: steps.first-build.outcome == 'failure'
        working-directory: ./template
        run: ./gradlew build --no-daemon

      - name: Upload to Modrinth
        env:
          MODRINTH_API_TOKEN: ${{ secrets.MODRINTH_API_TOKEN }}
          RELEASE_TYPE: alpha
        run: node scripts/upload.js

      - name: Commit tracking files
        run: |
          git config user.name "Mod Factory Bot"
          git config user.email "bot@modfactory.dev"
          git add data/published-mods.json || true
          git diff --staged --quiet || git commit -m "chore: track published mod [skip ci]"
          git push

      - name: Save problem log on failure
        if: failure()
        run: |
          MOD_ID=$(node -e "try{const m=JSON.parse(require('fs').readFileSync('./generated-mod.json','utf-8'));console.log(m.modId)}catch{console.log('unknown-mod')}" 2>/dev/null || echo "unknown-mod")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          LOG_DIR="Problem_logfile/${MOD_ID}/${TIMESTAMP}"
          mkdir -p "$LOG_DIR"

          {
            echo "# Pipeline Failure — ${MOD_ID}"
            echo ""
            echo "**Timestamp:** ${TIMESTAMP}"
            echo "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo ""
            echo "## Generated Mod"
          } > "$LOG_DIR/error.md"

          if [ -f generated-mod.json ]; then
            echo '```json' >> "$LOG_DIR/error.md"
            cat generated-mod.json >> "$LOG_DIR/error.md"
            echo '```' >> "$LOG_DIR/error.md"
            cp generated-mod.json "$LOG_DIR/generated-mod.json"
          fi

          if [ -f build-output.txt ]; then
            grep -E "error:|cannot find symbol" build-output.txt > "$LOG_DIR/compile-errors.txt" || true
          fi

          git config user.name "Mod Factory Bot"
          git config user.email "bot@modfactory.dev"
          git add "Problem_logfile/"
          git diff --staged --quiet || git commit -m "log: failure ${MOD_ID} ${TIMESTAMP} [skip ci]"
          git push

      - name: Create GitHub issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline failed: ${new Date().toISOString().split('T')[0]}`,
              body: `Pipeline failed. See [Actions run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).\n\nError log: \`Problem_logfile/\``,
              labels: ['pipeline-failure']
            });
