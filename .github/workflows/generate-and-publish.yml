name: Generate and Publish Mod

on:
  schedule:
    - cron: '0 10 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      - name: Generate mod via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate.js

      - name: Generate images via fal.ai
        env:
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
        run: node scripts/build-images.js

      - name: Inject generated code into template
        run: node scripts/inject.js

      - name: Build mod with Gradle
        working-directory: ./template
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon

      - name: Upload to CurseForge + Modrinth
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_PROJECT_IDS: ${{ secrets.CF_PROJECT_IDS }}
          MODRINTH_API_TOKEN: ${{ secrets.MODRINTH_API_TOKEN }}
          RELEASE_TYPE: alpha
        run: node scripts/upload.js

      - name: Commit updated tracking files
        run: |
          git config user.name "Mod Factory Bot"
          git config user.email "bot@modfactory.dev"
          git add data/recent-mods.json data/used-cf-projects.json || true
          git diff --staged --quiet || git commit -m "chore: update mod tracking [skip ci]"
          git push

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline failed: ${new Date().toISOString().split('T')[0]}`,
              body: `The mod generation pipeline failed. Check the [Actions run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`,
              labels: ['pipeline-failure']
            });
