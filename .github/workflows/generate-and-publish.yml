name: Generate and Publish Mod

on:
  schedule:
    - cron: '0 10 * * 1,3,5'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Node dependencies
        run: npm ci

      - name: Generate mod via Claude API
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate.js

      - name: Generate images via fal.ai
        env:
          FAL_API_KEY: ${{ secrets.FAL_API_KEY }}
        run: node scripts/build-images.js

      - name: Inject generated code into template
        run: node scripts/inject.js

      - name: Build mod with Gradle (with retry)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          chmod +x template/gradlew
          build_attempt() {
            cd template && ./gradlew build --no-daemon 2>&1
          }

          output=$(build_attempt)
          exit_code=$?
          echo "$output"

          if [ $exit_code -ne 0 ]; then
            echo "::warning::First build failed — asking Claude to fix compile errors..."
            cd ..
            # Extract error lines and send to Claude for a fix
            errors=$(echo "$output" | grep -E "error:|cannot find symbol|symbol:|location:" | head -20)
            node -e "
              import('@anthropic-ai/sdk').then(async ({ default: Anthropic }) => {
                const fs = await import('fs');
                const client = new Anthropic({ apiKey: process.env.ANTHROPIC_API_KEY });
                const mod = JSON.parse(fs.readFileSync('./generated-mod.json', 'utf-8'));
                const res = await client.messages.create({
                  model: 'claude-sonnet-4-6',
                  max_tokens: 4096,
                  tools: [{ name: 'fix_code', description: 'Return fixed Java code', input_schema: { type: 'object', properties: { javaCode: { type: 'string' } }, required: ['javaCode'] } }],
                  tool_choice: { type: 'tool', name: 'fix_code' },
                  messages: [{ role: 'user', content: 'Fix these Java compile errors in this Minecraft Fabric 1.21.1 mod. Only use APIs that exist in Fabric API 0.102.0+1.21.1. Do NOT use setStepHeight() or any removed methods.\n\nCurrent code:\n\`\`\`java\n' + mod.javaCode + '\n\`\`\`\n\nErrors:\n${errors}' }]
                });
                const fix = res.content.find(b => b.type === 'tool_use');
                if (fix) {
                  mod.javaCode = fix.input.javaCode;
                  fs.writeFileSync('./generated-mod.json', JSON.stringify(mod, null, 2));
                  console.log('Code fixed by Claude');
                }
              });
            "
            node scripts/inject.js
            cd template && ./gradlew build --no-daemon
          fi

      - name: Upload to CurseForge + Modrinth
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_PROJECT_IDS: ${{ secrets.CF_PROJECT_IDS }}
          MODRINTH_API_TOKEN: ${{ secrets.MODRINTH_API_TOKEN }}
          RELEASE_TYPE: alpha
        run: node scripts/upload.js

      - name: Commit updated tracking files
        run: |
          git config user.name "Mod Factory Bot"
          git config user.email "bot@modfactory.dev"
          git add data/recent-mods.json data/used-cf-projects.json || true
          git diff --staged --quiet || git commit -m "chore: update mod tracking [skip ci]"
          git push

      - name: Save problem log on failure
        if: failure()
        run: |
          MOD_ID=$(node -e "try{const m=require('./generated-mod.json');console.log(m.modId)}catch{console.log('unknown-mod')}" 2>/dev/null || echo "unknown-mod")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%SZ")
          LOG_DIR="Problem_logfile/${MOD_ID}/${TIMESTAMP}"
          mkdir -p "$LOG_DIR"

          cat > "$LOG_DIR/error.md" << EOF
          # Pipeline Failure — ${MOD_ID}

          **Timestamp:** ${TIMESTAMP}
          **Run URL:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Trigger:** ${{ github.event_name }}

          ## What failed
          Check the run URL above for the full step-by-step log.

          ## Generated Mod Info
          EOF

          if [ -f generated-mod.json ]; then
            echo '```json' >> "$LOG_DIR/error.md"
            cat generated-mod.json >> "$LOG_DIR/error.md"
            echo '```' >> "$LOG_DIR/error.md"
            cp generated-mod.json "$LOG_DIR/generated-mod.json"
          else
            echo "_generated-mod.json not available (failure before generate step)_" >> "$LOG_DIR/error.md"
          fi

          if [ -f template/build/reports/problems/problems-report.html ] || ls template/build/reports/ 2>/dev/null | head -5; then
            echo "" >> "$LOG_DIR/error.md"
            echo "## Gradle Build Report" >> "$LOG_DIR/error.md"
            echo "_See $LOG_DIR/build-error.txt_" >> "$LOG_DIR/error.md"
            find template/build/reports -name "*.txt" -exec cat {} >> "$LOG_DIR/build-error.txt" \; 2>/dev/null || true
          fi

          git config user.name "Mod Factory Bot"
          git config user.email "bot@modfactory.dev"
          git add "Problem_logfile/"
          git diff --staged --quiet || git commit -m "log: pipeline failure for ${MOD_ID} at ${TIMESTAMP} [skip ci]"
          git push

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const modId = '${{ github.run_number }}';
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline failed: ${new Date().toISOString().split('T')[0]}`,
              body: `The mod generation pipeline failed. Check the [Actions run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nError log saved to \`Problem_logfile/\` in the repository.`,
              labels: ['pipeline-failure']
            });
